syntax = "proto3";

package wings.cluster;

import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "schema/arrow_type.proto";

// service to manage cluster resources.
service ClusterService {
  // Create a new namespace.
  rpc CreateNamespace(CreateNamespaceRequest) returns (Namespace) {}
  // Update the specified namespace.
  rpc UpdateNamespace(UpdateNamespaceRequest) returns (Namespace) {}
  // Return the specified namespace.
  rpc GetNamespace(GetNamespaceRequest) returns (Namespace) {}
  // List all namespaces.
  rpc ListNamespaces(ListNamespacesRequest) returns (ListNamespacesResponse) {}
  // Delete a namespace.
  //
  // The request fails if the namespace has any table.
  rpc DeleteNamespace(DeleteNamespaceRequest) returns (google.protobuf.Empty) {}

  // Create a new table belonging to a namespace.
  rpc CreateTable(CreateTableRequest) returns (Table) {}
  // Return the specified table.
  rpc GetTable(GetTableRequest) returns (Table) {}
  // List all tables belonging to a namespace.
  rpc ListTables(ListTablesRequest) returns (ListTablesResponse) {}
  // Delete a table.
  rpc DeleteTable(DeleteTableRequest) returns (google.protobuf.Empty) {}
}

message CreateNamespaceRequest {
  // The namespace id.
  string namespace_id = 1;

  // The namespace definition.
  Namespace namespace = 2;
}

message UpdateNamespaceRequest {
  // The namespace to update.
  //
  // The namespace `name` field is used to identify the namespace to update.
  // Format: `namespaces/{namespace}`.
  Namespace namespace = 1;

  // The list of fields to update.
  google.protobuf.FieldMask update_mask = 2;
}

message GetNamespaceRequest {
  // The namespace name.
  //
  // Format: `namespaces/{namespace}`
  string name = 1;
}

message ListNamespacesRequest {
  // The number of namespaces to return.
  //
  // Default: 100
  // Maximum: 1000
  optional int32 page_size = 1;

  // The continuation token.
  optional string page_token = 2;
}

message ListNamespacesResponse {
  // The namespaces.
  repeated Namespace namespaces = 1;

  // The continuation token.
  string next_page_token = 2;
}

message DeleteNamespaceRequest {
  // The namespace name.
  //
  // Format: `namespaces/{namespace}`
  string name = 1;
}

message Namespace {
  // The namespace name.
  //
  // Format: `namespaces/{namespace}`
  string name = 1;

  // The object store configuration.
  ObjectStore object_store = 2;

  // The lake configuration.
  Lake lake = 3;
}

message ObjectStore {
  // Object store configuration.
  oneof object_store_config {
    AwsConfiguration aws = 2;
    AzureConfiguration azure = 3;
    GoogleConfiguration google = 4;
    S3CompatibleConfiguration s3_compatible = 5;
  }
}

message CreateTableRequest {
  // The namespace that owns the table.
  //
  // Format: namespaces/{namespace}
  string parent = 1;

  // The table id.
  string table_id = 2;

  // The table metadata.
  Table table = 3;
}

message GetTableRequest {
  // The table name.
  //
  // Format: namespaces/{namespace}/tables/{table}
  string name = 1;
}

message ListTablesRequest {
  // The parent namespace.
  //
  // Format: namespaces/{namespace}
  string parent = 1;

  // The number of tables to return.
  //
  // Default: 100
  // Maximum: 1000.
  optional int32 page_size = 2;

  // The continuation token.
  optional string page_token = 3;
}

message ListTablesResponse {
  // The tables.
  repeated Table tables = 1;

  // The continuation token.
  string next_page_token = 2;
}

message DeleteTableRequest {
  // The table name.
  //
  // Format: namespaces/{namespace}/tables/{table}
  string name = 1;
}

message Table {
  // The table name.
  //
  // Format: namespaces/{namespace}/tables/{table}
  string name = 1;

  // The table schema.
  schema.Schema schema = 2;

  // The table description.
  optional string description = 3;

  // The id of the key field.
  uint64 key_field_id = 4;

  // The id of the version field.
  uint64 version_field_id = 5;

  // The id of the field that is used to partition the table.
  optional uint64 partition_field_id = 6;

  // How often to sync data to the target data lake.
  uint64 target_freshness_seconds = 7;
}

message AwsConfiguration {
  // Bucket name.
  string bucket_name = 1;

  // Bucket prefix.
  optional string prefix = 2;

  /// `AWS_ACCESS_KEY_ID`
  string access_key_id = 3;

  /// `AWS_SECRET_ACCESS_KEY`
  string secret_access_key = 4;

  /// `AWS_DEFAULT_REGION`
  optional string region = 5;
}

message AzureConfiguration {
  // Azure container name.
  string container_name = 1;

  // Container prefix.
  optional string prefix = 2;

  // `AZURE_STORAGE_ACCOUNT_NAME`
  string storage_account_name = 3;

  // `AZURE_STORAGE_ACCOUNT_KEY`
  string storage_account_key = 4;
}

message GoogleConfiguration {
  /// Bucket name.
  string bucket_name = 1;

  /// Bucket prefix.
  optional string prefix = 2;

  /// `GOOGLE_SERVICE_ACCOUNT`
  string service_account = 3;

  /// `GOOGLE_SERVICE_ACCOUNT_KEY`
  string service_account_key = 4;
}

message S3CompatibleConfiguration {
  // Bucket name.
  string bucket_name = 1;

  // Bucket prefix.
  optional string prefix = 2;

  /// `AWS_ACCESS_KEY_ID`
  string access_key_id = 3;

  /// `AWS_SECRET_ACCESS_KEY`
  string secret_access_key = 4;

  /// `AWS_DEFAULT_REGION`
  optional string region = 5;

  /// `AWS_ENDPOINT`
  string endpoint = 6;

  /// Allow HTTP connections.
  bool allow_http = 7;
}

message Lake {
  // Lake configuration.
  oneof lake_config {
    ParquetConfiguration parquet = 2;
    IcebergConfiguration iceberg = 3;
    DeltaConfiguration delta = 4;
  }
}

message IcebergConfiguration {}

message ParquetConfiguration {}

message DeltaConfiguration {}
